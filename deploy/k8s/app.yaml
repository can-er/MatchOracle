# MatchOracle API: Deployment + Service + HPA (Sprint 14, stories 14-2 & 14-4).
# Secrets (DB URL, API keys, JWT) come from the `matchoracle-secrets` Secret —
# never baked into the image (Sprint 13). Postgres/Redis are assumed managed or
# deployed separately (see your platform's stateful templates).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchoracle-app
  namespace: matchoracle
  labels: { app: matchoracle, component: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: matchoracle, component: api }
  template:
    metadata:
      labels: { app: matchoracle, component: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: matchoracle-app:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef: { name: matchoracle-secrets }
          env:
            - name: MO_METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: matchoracle-app
  namespace: matchoracle
  labels: { app: matchoracle, component: api }
spec:
  selector: { app: matchoracle, component: api }
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matchoracle-app
  namespace: matchoracle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matchoracle-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
