# Prometheus scrape config (Sprint 14). Scrapes the MatchOracle app's /metrics.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: matchoracle
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
