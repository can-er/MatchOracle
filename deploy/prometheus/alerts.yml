# Alerting rules (Sprint 14, DoD: alerting on key indicators).
groups:
  - name: matchoracle-slo
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(matchoracle_http_requests_total{status=~"5.."}[5m]))
            / sum(rate(matchoracle_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate above 5% for 5 minutes"

      - alert: HighRequestLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(matchoracle_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 request latency above 2s for 10 minutes"

      - alert: AppDown
        expr: up{job="matchoracle"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MatchOracle app target is down"
